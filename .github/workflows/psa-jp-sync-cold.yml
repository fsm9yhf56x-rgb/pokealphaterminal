name: PSA JP Sync COLD (monthly, manual)

on:
  schedule:
    - cron: '0 7 1 * *'   # 1st of month, 7h UTC monthly
  workflow_dispatch:

# 471 sets COLD JP cannot fit in GitHub Actions 6h timeout.
# We use matrix strategy to parallelize: split into 4 chunks of ~118 sets each.
# Each chunk has its own runner, and they run in parallel.

jobs:
  scrape-cold-jp:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # ~6h max
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]   # 4 parallel chunks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run PSA JP scraper (cold tier, chunk ${{ matrix.chunk }} of 4)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHUNK_INDEX: ${{ matrix.chunk }}
          CHUNK_TOTAL: 4
        run: npm run psa:scrape:jp:cold
