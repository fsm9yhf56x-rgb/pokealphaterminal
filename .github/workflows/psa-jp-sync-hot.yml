name: PSA JP Sync HOT (daily)

on:
  schedule:
    - cron: '0 4 * * *'  # 4h UTC daily, 1h after EN HOT to avoid overlap
  workflow_dispatch:

jobs:
  scrape-hot-jp:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 14 sets × ~3min each (slower for JP)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run PSA JP scraper (hot tier)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run psa:scrape:jp:hot
