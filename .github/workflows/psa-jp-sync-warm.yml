name: PSA JP Sync WARM (weekly)

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 5h UTC weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-warm-jp:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 30 sets × ~4min each = ~2h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run PSA JP scraper (warm tier)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run psa:scrape:jp:warm

      - name: Rebuild static JSON
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/rebuild-static-data.mjs

      - name: Auto-commit JSON updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --staged --quiet || (git commit -m "chore(data): auto-rebuild after PSA sync $(date +%Y-%m-%d)" && git push)
