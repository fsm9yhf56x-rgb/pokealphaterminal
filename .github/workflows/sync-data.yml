name: Sync TCGDex Data

on:
  schedule:
    - cron: '0 4 1 * *'  # 1er du mois à 4h UTC
  workflow_dispatch:       # trigger manuel depuis GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/sync-tcgdex.js
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || (git commit -m "chore: sync TCGDex data $(date +%Y-%m-%d)" && git push)
