name: Monthly Data Sync

on:
  schedule:
    - cron: '0 3 1 * *'  # 1er de chaque mois à 3h du matin
  workflow_dispatch:  # Lancement manuel possible

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync EN/FR images
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-images.js

      - name: Retry failed images
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-images-retry.js

      - name: Sync PokemonTCG.io fallback
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-from-ptcgio.js

      - name: Sync JP images
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-jp-full.js

      - name: Fix EN/FR table
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fix-tcg-cards-table.js

      - name: Rebuild JP table
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/rebuild-jp-table.js

      - name: Export JP static JSON
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/fix-jp-static.js
          node scripts/enrich-jp-sets.js
          node scripts/sync-jp-logos.js
          node scripts/add-jp-set-names.js
          node scripts/fix-jp-series-final.js

      - name: Update Pokédex dictionary
        run: node scripts/build-pokedex-dict.js

      - name: Commit & push updated data
        run: |
          git config user.name "PokéAlpha Bot"
          git config user.email "bot@pokealphaterminal.io"
          git add public/data/ 
          git diff --staged --quiet || git commit -m "chore: monthly data sync $(date +%Y-%m-%d)"
          git push
